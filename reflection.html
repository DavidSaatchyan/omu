<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Рефлексия</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/soft-presence-ui.css">
</head>
<body class="reflection-screen soft-ui">
    <div class="container fade-gentle">
        <!-- Вопрос — как приглашение, не как опрос -->
        <div class="reflection-header">
            <p class="reflection-question">Как ты себя чувствуешь?</p>
        </div>
        
        <!-- Кнопки-состояния (не формальные варианты) -->
        <div class="reflection-options">
            <button class="reflection-state" data-value="quiet">
                <span class="state-icon">◌</span>
                <span class="state-text">Спокойствие</span>
            </button>
            <button class="reflection-state" data-value="present">
                <span class="state-icon">◌</span>
                <span class="state-text">Присутствие</span>
            </button>
            <button class="reflection-state" data-value="warmth">
                <span class="state-icon">◌</span>
                <span class="state-text">Тепло</span>
            </button>
            <button class="reflection-state" data-value="nothing">
                <span class="state-icon">◌</span>
                <span class="state-text">Никак</span>
            </button>
        </div>
        
        <!-- Поле ввода — без рамки, как приглашение -->
        <div class="reflection-free">
            <textarea id="freeText" class="free-input-soft" 
                      placeholder="Или просто напиши что-то своё..." 
                      rows="2"></textarea>
        </div>
        
        <!-- Кнопка отправки — мягкая, не CTA -->
        <div class="reflection-submit">
            <button id="submitReflection" class="soft-submit">запомнить</button>
        </div>
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/state.js"></script>
    <script>
        let selectedState = null;
        let selectedValue = '';
        
        const stateButtons = document.querySelectorAll('.reflection-state');
        const freeText = document.getElementById('freeText');
        const submitBtn = document.getElementById('submitReflection');
        
        // Обработка выбора состояния
        stateButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Убираем активное состояние у всех
                stateButtons.forEach(b => {
                    b.classList.remove('active');
                    const icon = b.querySelector('.state-icon');
                    if(icon) icon.textContent = '◌';
                });
                
                // Добавляем активное текущей кнопке
                btn.classList.add('active');
                const activeIcon = btn.querySelector('.state-icon');
                if(activeIcon) activeIcon.textContent = '●';
                
                // Сохраняем выбранное значение
                selectedState = btn;
                selectedValue = btn.querySelector('.state-text').textContent;
                
                // Очищаем текстовое поле, если было заполнено
                freeText.value = '';
                
                // Лёгкая вибрация
                if(window.Telegram?.WebApp?.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
            });
        });
        
        // Обработка текстового поля
        freeText.addEventListener('input', () => {
            if(freeText.value.trim() !== '') {
                // Если пользователь пишет, убираем выделение с кнопок
                stateButtons.forEach(b => {
                    b.classList.remove('active');
                    const icon = b.querySelector('.state-icon');
                    if(icon) icon.textContent = '◌';
                });
                selectedState = null;
                selectedValue = '';
            }
        });
        
        // Отправка рефлексии
        submitBtn.addEventListener('click', () => {
            let reflection = '';
            let reflectionType = '';
            
            if(selectedValue) {
                reflection = selectedValue;
                reflectionType = 'state';
            } else if(freeText.value.trim() !== '') {
                reflection = freeText.value.trim();
                reflectionType = 'custom';
            } else {
                // Ничего не выбрано — просто переходим (без давления)
                if(window.appState) {
                    window.appState.sendAnalytics('reflection_skipped', {});
                }
                window.location.href = 'finish.html';
                return;
            }
            
            // Сохраняем рефлексию
            if(window.appState) {
                window.appState.sendAnalytics('reflection', { 
                    answer: reflection,
                    answer_type: reflectionType,
                    timestamp: Date.now()
                });
                
                // Сохраняем локально
                const reflections = JSON.parse(localStorage.getItem('omu_reflections') || '[]');
                reflections.push({
                    answer: reflection,
                    type: reflectionType,
                    date: new Date().toISOString()
                });
                if(reflections.length > 10) reflections.shift();
                localStorage.setItem('omu_reflections', JSON.stringify(reflections));
            }
            
            // Мягкая вибрация при отправке
            if(window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
            
            // Плавный переход
            submitBtn.style.transform = 'scale(0.96)';
            submitBtn.style.opacity = '0.7';
            setTimeout(() => {
                window.location.href = 'finish.html';
            }, 200);
        });
        
        // Ctrl+Enter для отправки
        freeText.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
