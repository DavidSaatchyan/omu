<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Практика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="practice-screen">
    <div class="practice-container">
        <!-- Верхняя панель -->
        <div class="practice-header">
            <button class="back-button" id="cancelBtn">Отмена</button>
            <span class="bot-indicator">bot</span>
            <button class="finish-button" id="finishBtn">Финиш</button>
        </div>
        
        <!-- Таймер (крупно) -->
        <div class="timer-display" id="timerDisplay">1:00</div>
        
        <!-- Анимация дыхания (пульсирующий круг) -->
        <div class="breathing-container">
            <canvas id="breathingCanvas" width="240" height="240"></canvas>
        </div>
        
        <!-- Текстовая подсказка фазы -->
        <div class="phase-hint" id="phaseHint">Вдох</div>
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/state.js"></script>
    <script src="js/breathing.js"></script>
    <script>
        // Длительность практики в секундах (1:00 = 60 сек)
        // Можно сделать 3-10 минут, но по макету 1:00
        const durationSeconds = 60;
        
        // Инициализация анимации дыхания и таймера
        const breathing = new BreathingAnimation({
            canvasId: 'breathingCanvas',
            phaseHintId: 'phaseHint',
            onPhaseChange: (phase) => {
                console.log('Phase:', phase);
            }
        });
        
        breathing.start();
        
        // Таймер обратного отсчёта
        let remaining = durationSeconds;
        const timerElement = document.getElementById('timerDisplay');
        
        const timerInterval = setInterval(() => {
            remaining--;
            const minutes = Math.floor(remaining / 60);
            const seconds = remaining % 60;
            timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            if(remaining <= 0) {
                clearInterval(timerInterval);
                breathing.stop();
                // Сохраняем практику и переходим к рефлексии
                if(window.appState) {
                    window.appState.addPractice(durationSeconds / 60);
                }
                window.location.href = 'reflection.html';
            }
        }, 1000);
        
        // Кнопки
        document.getElementById('cancelBtn').addEventListener('click', () => {
            if(confirm('Прервать практику?')) {
                window.location.href = 'guide.html';
            }
        });
        
        document.getElementById('finishBtn').addEventListener('click', () => {
            if(confirm('Завершить практику сейчас?')) {
                clearInterval(timerInterval);
                breathing.stop();
                if(window.appState) {
                    window.appState.addPractice((durationSeconds - remaining) / 60);
                }
                window.location.href = 'reflection.html';
            }
        });
    </script>
</body>
</html>
