<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Практика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/soft-presence-ui.css">
</head>
<body class="practice-screen">
    <div class="practice-container">
        
        <!-- Заголовок -->
        <div class="practice-headline">Практика осознанности</div>
        
        <!-- Дышащая фигура -->
        <div class="figure-container">
            <div id="breathingFigure" class="breathing-figure"></div>
        </div>
        
        <!-- Крупная кнопка PLAY/PAUSE -->
        <button id="playPauseBtn" class="main-play-btn">▶</button>
        
        <!-- Таймер -->
        <div class="timer-container">
            <span id="timerDisplay" class="timer-digits">0:00</span>
        </div>
        
        <!-- Текст подсказки -->
        <div class="hint-container">
            <div id="phaseName" class="phase-name">Вдох</div>
            <div id="phaseInstruction" class="phase-instruction">почувствуй тело</div>
        </div>
        
        <!-- Кнопки управления (пауза) -->
        <div id="actionButtons" class="action-buttons hidden">
            <button id="cancelBtn" class="action-circle cancel-btn">Отмена</button>
            <button id="finishActionBtn" class="action-circle finish-btn">Финиш</button>
        </div>
        
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/state.js"></script>
    <script src="js/breathing-final.js"></script>
</body>
</html>
