<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Практика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/soft-presence-ui.css">
</head>
<body class="practice-screen">
    <div class="practice-container">
        
        <!-- Верхняя панель -->
        <div class="practice-header">
            <button id="backBtn" class="back-btn">← Back</button>
            <div class="app-title">Omu: Brake to Awake</div>
            <div class="bot-indicator">bot</div>
        </div>
        
        <!-- Таймер -->
        <div class="timer-large" id="timerDisplay">0:44</div>
        
        <!-- Анимация дыхания -->
        <div class="breathing-wrapper">
            <div id="breathingShape" class="breathing-shape"></div>
        </div>
        
        <!-- Текст фазы -->
        <div id="phaseText" class="phase-text-guide">Вдох</div>
        <div id="phaseInstruction" class="phase-instruction">почувствуй тело</div>
        
        <!-- Кнопки управления -->
        <div class="practice-controls">
            <button id="cancelBtn" class="cancel-btn">Отмена</button>
            <button id="playPauseBtn" class="play-pause-btn">⏸</button>
            <button id="finishBtn" class="finish-btn hidden">Финиш</button>
        </div>
        
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/state.js"></script>
    <script src="js/breathing-practice.js"></script>
    <script>
        // Настройки практики
        const practiceDuration = 44; // секунд (0:44)
        
        // Инициализация дыхательной практики
        const breathing = new BreathingPractice({
            shapeElement: 'breathingShape',
            phaseTextElement: 'phaseText',
            instructionElement: 'phaseInstruction',
            timerElement: 'timerDisplay',
            duration: practiceDuration,
            onComplete: () => {
                // Переход на рефлексию
                if(window.appState) {
                    window.appState.addPractice(practiceDuration / 60);
                }
                window.location.href = 'reflection.html';
            }
        });
        
        // Кнопки
        document.getElementById('backBtn').addEventListener('click', () => {
            if(confirm('Прервать практику?')) {
                breathing.stop();
                window.location.href = 'index.html';
            }
        });
        
        document.getElementById('cancelBtn').addEventListener('click', () => {
            if(confirm('Отменить практику?')) {
                breathing.stop();
                window.location.href = 'index.html';
            }
        });
        
        document.getElementById('playPauseBtn').addEventListener('click', () => {
            const btn = document.getElementById('playPauseBtn');
            const finishBtn = document.getElementById('finishBtn');
            
            if(breathing.isPlaying) {
                breathing.pause();
                btn.textContent = '▶';
                finishBtn.classList.remove('hidden');
            } else {
                breathing.resume();
                btn.textContent = '⏸';
                finishBtn.classList.add('hidden');
            }
        });
        
        document.getElementById('finishBtn').addEventListener('click', () => {
            if(confirm('Завершить практику?')) {
                breathing.stop();
                if(window.appState) {
                    const elapsed = practiceDuration - breathing.remaining;
                    window.appState.addPractice(elapsed / 60);
                }
                window.location.href = 'reflection.html';
            }
        });
    </script>
</body>
</html>
