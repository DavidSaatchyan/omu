<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Практика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/soft-presence-ui.css">
</head>
<body class="practice-screen">
    <div class="practice-container">
        
        <!-- Заголовок сверху -->
        <div class="practice-header-title">
            <h1 class="practice-headline">Практика осознанности</h1>
        </div>
        
        <!-- Дышащая фигура (центр) -->
        <div class="figure-wrapper">
            <div id="breathingFigure" class="breathing-figure"></div>
        </div>
        
        <!-- Крупная кнопка PLAY/PAUSE -->
        <div class="play-wrapper">
            <button id="playPauseBtn" class="play-circle">▶</button>
        </div>
        
        <!-- Таймер (под кнопкой) -->
        <div class="timer-wrapper">
            <span id="timerDisplay" class="practice-timer">0:00</span>
        </div>
        
        <!-- Текст подсказки (появляется) -->
        <div class="hint-wrapper">
            <div id="hintText" class="hint-text">Вдох</div>
            <div id="hintSubtext" class="hint-subtext">почувствуй тело</div>
        </div>
        
        <!-- Кнопки управления (появляются при паузе) -->
        <div id="controlButtons" class="control-buttons hidden">
            <button id="cancelCircle" class="control-circle cancel">Отмена</button>
            <button id="finishCircle" class="control-circle finish">Финиш</button>
        </div>
        
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/state.js"></script>
    <script src="js/breathing-core.js"></script>
</body>
</html>
