<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Практика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="practice-screen">
    <!-- Верхняя панель как в макете -->
    <div class="practice-header">
        <button class="back-btn" id="backBtn">← Back</button>
        <div class="app-title">Omu: Brake to Awake</div>
        <div class="bot-indicator">bot</div>
    </div>
    
    <!-- Таймер (крупные цифры) -->
    <div class="timer-large" id="timerDisplay">1:00</div>
    
    <!-- Размытое пятно (анимация дыхания) -->
    <div class="blur-container">
        <div id="blurCircle" class="blur-circle"></div>
    </div>
    
    <!-- Нижние кнопки по бокам -->
    <div class="practice-footer">
        <button class="cancel-btn" id="cancelBtn">Отмена</button>
        <button class="finish-btn" id="finishBtn">Финиш</button>
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/state.js"></script>
    <script src="js/blur-breathing.js"></script>
    <script>
        const durationSeconds = 60; // 1:00 по макету
        let remaining = durationSeconds;
        const timerElement = document.getElementById('timerDisplay');
        
        // Запускаем анимацию размытого пятна
        const breathing = new BlurBreathing('blurCircle');
        breathing.start();
        
        // Таймер
        const timerInterval = setInterval(() => {
            remaining--;
            const minutes = Math.floor(remaining / 60);
            const seconds = remaining % 60;
            timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            if(remaining <= 0) {
                clearInterval(timerInterval);
                breathing.stop();
                if(window.appState) {
                    window.appState.addPractice(durationSeconds / 60);
                }
                window.location.href = 'reflection.html';
            }
        }, 1000);
        
        // Кнопки
        document.getElementById('backBtn').addEventListener('click', () => {
            if(confirm('Прервать практику?')) {
                window.location.href = 'guide.html';
            }
        });
        
        document.getElementById('cancelBtn').addEventListener('click', () => {
            if(confirm('Отменить практику?')) {
                window.location.href = 'index.html';
            }
        });
        
        document.getElementById('finishBtn').addEventListener('click', () => {
            if(confirm('Завершить практику?')) {
                clearInterval(timerInterval);
                breathing.stop();
                if(window.appState) {
                    window.appState.addPractice((durationSeconds - remaining) / 60);
                }
                window.location.href = 'reflection.html';
            }
        });
    </script>
</body>
</html>
