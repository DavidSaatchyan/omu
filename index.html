<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Brake to Awake</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/soft-presence-ui.css">
</head>
<body class="intro-screen">
    <div class="intro-container">
        
        <!-- Логотип выше -->
        <div class="intro-logo">
            <img src="assets/logo.svg" alt="Omu" class="omu-logo-img">
        </div>
        
        <!-- Центральный контент (ближе к лого) -->
        <div class="intro-content">
            <div class="omu-title">
                <span class="omu-small">Omu:</span>
                <span class="break-small">Break to Awake</span>
            </div>
            <div class="you-here animate-here">
                <span class="here-medium">Ты здесь</span>
            </div>
        </div>
        
        <!-- Кнопка со светлой заливкой -->
        <div class="intro-footer">
            <button id="enterBtn" class="enter-button-light">Войти в тишину</button>
        </div>
        
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/transitions.js"></script>
    <script>
        const enterBtn = document.getElementById('enterBtn');

        let entering = false;
        const enterPractice = () => {
            if (entering) return;
            entering = true;

            enterBtn.style.transform = 'scale(0.96)';

            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }

            // Important: on mobile Telegram WebView, navigation triggered asynchronously (setTimeout)
            // can be blocked. Navigate synchronously within the user gesture.
            const isMobileTg = Boolean(window.Telegram?.WebApp) && window.Telegram.WebApp.platform !== 'tdesktop';
            if (isMobileTg) {
                window.location.href = 'practice.html?v=20260409_2';
                return;
            }

            if (window.pageTransition) {
                window.pageTransition.navigateTo('practice.html?v=20260409_2');
            } else {
                window.location.href = 'practice.html?v=20260409_2';
            }
        };

        // Mobile Telegram WebView can miss 'click' on fast taps; listen to pointer/touch as well.
        enterBtn.addEventListener('pointerup', enterPractice);
        enterBtn.addEventListener('touchend', enterPractice, { passive: true });
        enterBtn.addEventListener('click', enterPractice);
    </script>
</body>
</html>
