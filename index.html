<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Brake to Awake</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/soft-presence-ui.css">
</head>
<body class="intro-screen">
    <div class="intro-container">
        <!-- Верхняя панель -->
        <div class="intro-header">
            <span class="app-name">Omu: Brake to Awake</span>
            <span class="bot-badge">bot</span>
        </div>
        
        <!-- Центральный контент -->
        <div class="intro-content">
            <div class="omu-logo">
                <span class="omu-large">Omu:</span>
                <span class="break-large">Break to Awake</span>
            </div>
            <div class="you-are-here">
                <span class="here-text">Ты здесь</span>
            </div>
        </div>
        
        <!-- Кнопка внизу -->
        <div class="intro-footer">
            <button id="enterBtn" class="enter-button">Войти в тишину</button>
        </div>
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/transitions.js"></script>
    <script>
        const enterBtn = document.getElementById('enterBtn');
        
        enterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            
            // Мягкое сжатие
            enterBtn.style.transform = 'scale(0.96)';
            enterBtn.style.opacity = '0.7';
            
            // Вибрация
            if(window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
            
            setTimeout(() => {
                if(window.pageTransition) {
                    window.pageTransition.navigateTo('guide.html');
                } else {
                    window.location.href = 'guide.html';
                }
            }, 150);
        });
    </script>
</body>
</html>
