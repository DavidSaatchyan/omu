<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omu — Гид</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/soft-presence-ui.css">
</head>
<body class="guide-screen soft-ui">
    <div class="guide-container fade-gentle">
        <!-- Верхняя панель (как на всех экранах) -->
        <div class="guide-header">
            <button class="back-btn" id="backBtn">← Back</button>
            <div class="app-title">Omu: Brake to Awake</div>
            <div class="bot-indicator">bot</div>
        </div>
        
        <!-- Центральный контент — текст как шёпот -->
        <div class="guide-content">
            <div class="guide-icon">
                <div class="gentle-pulse"></div>
            </div>
            <p class="guide-title">Практика осознанности</p>
            <p class="guide-text">Всё, что ты ищешь — уже здесь.<br>Просто смотри</p>
        </div>
        
        <!-- Кнопка начала — мягкая, не кричащая -->
        <div class="guide-footer">
            <button id="startPracticeBtn" class="soft-button guide-button">Начать</button>
        </div>
    </div>
    
    <script src="js/telegram.js"></script>
    <script src="js/transitions.js"></script>
    <script>
        // Элементы
        const backBtn = document.getElementById('backBtn');
        const startBtn = document.getElementById('startPracticeBtn');
        
        // Мягкий переход назад
        backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if(window.pageTransition) {
                window.pageTransition.softClick(backBtn, () => {
                    window.pageTransition.navigateTo('index.html');
                });
            } else {
                window.location.href = 'index.html';
            }
        });
        
        // Мягкий переход на практику
        startBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if(window.pageTransition) {
                window.pageTransition.softClick(startBtn, () => {
                    window.pageTransition.navigateTo('practice.html');
                });
            } else {
                window.location.href = 'practice.html';
            }
        });
        
        // Лёгкая вибрация при появлении экрана
        if(window.Telegram?.WebApp?.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
